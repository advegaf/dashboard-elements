<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <meta name="supported-color-schemes" content="dark" />
  <title>Log in to LEDGR</title>
</head>
<body bgcolor="#000000" style="margin:0;padding:0;background-color:#000000;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#000000" style="background-color:#000000;">
    <tr>
      <td align="center" style="padding:40px 20px;">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" bgcolor="#000000" style="background-color:#000000;max-width:600px;width:100%;">

          <!-- Logo -->
          <tr>
            <td align="center" bgcolor="#000000" style="background-color:#000000;padding:0 0 40px 0;">
              <img src="https://ledgrbilling.com/logo.png" alt="LEDGR" width="48" style="display:block;border:0;outline:none;text-decoration:none;color:#ffffff;font-size:24px;font-weight:bold;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;" />
            </td>
          </tr>

          <!-- Heading -->
          <tr>
            <td align="center" bgcolor="#000000" style="background-color:#000000;padding:0 0 12px 0;">
              <h1 style="margin:0;font-size:24px;font-weight:600;color:#ffffff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;letter-spacing:0.5px;">Log in to LEDGR</h1>
            </td>
          </tr>

          <!-- Body text -->
          <tr>
            <td align="center" bgcolor="#000000" style="background-color:#000000;padding:0 0 40px 0;">
              <p style="margin:0;font-size:16px;line-height:24px;color:#999999;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">Tap below to securely log in. This link expires in 60 minutes.</p>
            </td>
          </tr>

          <!-- CTA Button -->
          <tr>
            <td align="center" bgcolor="#000000" style="background-color:#000000;padding:0 0 40px 0;">
              <!--[if mso]>
              <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" xmlns:w="urn:schemas-microsoft-com:office:word" href="{{ .ConfirmationURL }}" style="height:48px;v-text-anchor:middle;width:220px;" arcsize="17%" fillcolor="#ffffff">
                <w:anchorlock/>
                <center style="color:#000000;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:16px;font-weight:700;">Log In</center>
              </v:roundrect>
              <![endif]-->
              <!--[if !mso]><!-->
              <a href="{{ .ConfirmationURL }}" target="_blank" style="display:inline-block;background-color:#ffffff;color:#000000;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:16px;font-weight:700;text-decoration:none;padding:14px 48px;border-radius:8px;mso-hide:all;">Log In</a>
              <!--<![endif]-->
            </td>
          </tr>

          <!-- Disclaimer -->
          <tr>
            <td align="center" bgcolor="#000000" style="background-color:#000000;padding:0 0 32px 0;">
              <p style="margin:0;font-size:14px;line-height:20px;color:#666666;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">If you didn't request this, you can safely ignore this email.</p>
            </td>
          </tr>

          <!-- Divider -->
          <tr>
            <td bgcolor="#000000" style="background-color:#000000;padding:0 0 32px 0;">
              <hr style="border:none;border-top:1px solid #1a1a1a;margin:0;" />
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" bgcolor="#000000" style="background-color:#000000;padding:0;">
              <p style="margin:0;font-size:12px;line-height:18px;color:#555555;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">&copy; 2026 LEDGR HOLDINGS LLC &middot; team@ledgrbilling.com</p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
